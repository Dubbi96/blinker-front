name: CI

# develop/staging push 시 빌드 검증만 수행합니다.
# (기존의 "빌드 성공 시 main으로 자동 force-push" 단계는 제거됨 —
#  main push는 곧 Vercel Production(운영) 배포이므로,
#  운영 반영은 staging 검증 완료 후 staging → main PR merge로만 진행합니다.)

on:
  push:
    branches:
      - develop
      - staging
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      # - name: test
      #   run: npm test
